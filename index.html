<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pill Reminder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Pill Reminder</h1>
        <p class="subtitle">Track your medicines and schedule</p>
      </header>

      <main>
        <section class="list-section">
          <div class="list-header">
            <h2>Schedule by date</h2>
            <span id="schedule-date-label" class="schedule-date-label"></span>
          </div>
          <div class="field field-dates">
            <div>
              <label for="schedule-date">Select date</label>
              <input type="date" id="schedule-date" />
            </div>
          </div>
          <div id="schedule-empty-state" class="empty-state">
            No medicines scheduled for this date.
          </div>
          <ul id="schedule-list" class="medicine-list"></ul>
        </section>

        <section class="list-section accordion collapsed" data-accordion-id="your-medicines">
          <div class="accordion-header">
            <div class="list-header">
              <h2>Your medicines</h2>
              <button id="clear-all" class="link-btn" type="button">Clear all</button>
            </div>
            <span class="accordion-icon" aria-hidden="true"></span>
          </div>
          <div class="accordion-body">
            <div id="empty-state" class="empty-state">
              No medicines added yet.
            </div>
            <ul id="medicine-list" class="medicine-list"></ul>
          </div>
        </section>

        <section class="card accordion collapsed" data-accordion-id="add-medicine">
          <button class="accordion-header" type="button">
            <h2>Add medicine</h2>
            <span class="accordion-icon" aria-hidden="true"></span>
          </button>
          <div class="accordion-body">
          <form id="medicine-form">
            <div class="field">
              <label for="name">Medicine name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="e.g. Metformin"
                required
              />
            </div>

            <div class="field">
              <label for="dose">Dose (optional)</label>
              <input
                type="text"
                id="dose"
                name="dose"
                placeholder="e.g. 500 mg"
              />
            </div>

            <div class="field">
              <label for="frequency">Frequency type</label>
              <select id="frequency" name="frequency" required>
                <option value="daily">Daily</option>
                <option value="specific-days">Specific days of week</option>
                <option value="every-other-day">Every other day</option>
              </select>
            </div>

            <div class="field field-inline">
              <span class="field-label">Time of day</span>
              <label class="chip">
                <input type="checkbox" name="timeOfDay" value="morning" />
                <span>Morning</span>
              </label>
              <label class="chip">
                <input type="checkbox" name="timeOfDay" value="afternoon" />
                <span>Afternoon</span>
              </label>
              <label class="chip">
                <input type="checkbox" name="timeOfDay" value="night" />
                <span>Night</span>
              </label>
            </div>

            <div class="field specific-days hidden" id="specific-days-field">
              <span class="field-label">Select days</span>
              <div class="day-chips">
                <label class="chip">
                  <input type="checkbox" name="days" value="Mon" />
                  <span>Mon</span>
                </label>
                <label class="chip">
                  <input type="checkbox" name="days" value="Tue" />
                  <span>Tue</span>
                </label>
                <label class="chip">
                  <input type="checkbox" name="days" value="Wed" />
                  <span>Wed</span>
                </label>
                <label class="chip">
                  <input typecheckbox" name="days" value="Thu" />
                  <span>Thu</span>
                </label>
                <label class="chip">
                  <input type="checkbox" name="days" value="Fri" />
                  <span>Fri</span>
                </label>
                <label class="chip">
                  <input type="checkbox" name="days" value="Sat" />
                  <span>Sat</span>
                </label>
                <label class="chip">
                  <input type="checkbox" name="days" value="Sun" />
                  <span>Sun</span>
                </label>
              </div>
            </div>

            <div class="field field-dates">
              <div>
                <label for="startDate">Start date</label>
                <input type="date" id="startDate" name="startDate" required />
              </div>
              <div>
                <label for="endDate">End date (optional)</label>
                <input type="date" id="endDate" name="endDate" />
              </div>
            </div>

            <div class="field">
              <label for="mealTiming">Relation to meals</label>
              <select id="mealTiming" name="mealTiming">
                <option value="">No preference</option>
                <option value="before">Before meal</option>
                <option value="after">After meal</option>
              </select>
            </div>

            <button type="submit" class="primary-btn">Add medicine</button>
          </form>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
